<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Integrasi GAS</title>
</head>
<body>
    <h2>Status Pengiriman Data GAS</h2>
    <div id="output-respons">Menghubungi server...</div>

    <script>
        const gasUrl = 'https://script.google.com/macros/s/AKfycbwGJqgws7XhcRFGkDme-eVRBWh6Lv7vOlDmgR8MCno92Rrmyottca_1PtMxL-BC1tDq/exec';
        // Hanya memodifikasi div ini, bukan seluruh halaman
        const outputElement = document.getElementById('output-respons');
        
        fetch(gasUrl, {
            method: 'POST',
            body: JSON.stringify({ data: "sampel dari github pages" })
        })
        .then(response => response.json())
        .then(data => {
            outputElement.innerHTML = `<b style="color:green;">Berhasil: ${JSON.stringify(data)}</b>`;
        })
        .catch(error => {
            outputElement.innerHTML = `<b style="color:red;">Gagal: ${error.message}</b>`;
        });
    </script>
</body>
</html>
